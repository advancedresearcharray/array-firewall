# array-firewall — CT940 @ 192.168.167.241
# TARGET: full network exit (replaces Firewalla as gateway). See docs/ARCHITECTURE.md

# lab | gateway (gateway active when CUTOVER=1)
ROLE=lab
CUTOVER=0
LAN_GATEWAY_IP=192.168.167.1

MGMT_IF=eth0
LAN_IF=eth1
WAN_IF=eth1
UPLINK_IF=eth0
LAB_CIDR=10.99.0.0/24
LAN_CIDR=10.99.0.0/24
MGMT_CIDR=192.168.167.0/24

# Gateway cutover (when nic1 = ISP, nic0 = house LAN):
# ROLE=gateway
# LAN_IF=eth0
# WAN_IF=eth1
# UPLINK_IF=eth1
# LAN_CIDR=192.168.167.0/24

# Admin laptop — only MAC allowed on first boot
ADMIN_LAPTOP_MAC=

# API + dashboard
API_PORT=8090
POLICIES_FILE=/var/lib/array-firewall/policies.json

# Xbox on main LAN today; packet-shield applies when traffic is forwarded to this host.
XBOX_IP=192.168.167.65
XBOX_MAC=

# Tiny kick/boot flood threshold (bytes). Normal Warzone UDP is typically 80–1400.
TINY_MAX=79

# Warzone / Xbox Live ports (match gaming-tools xbox-scope.sh)
XBOX_UDP_PORTS=(88 500 3074 3075 3544 4500 53 9002)
XBOX_TCP_PORTS=(3074 80 53 443 2869)

# Co-hosted array-firewall API (sentinel polls /api/v1/run on localhost)
ARRAY_FIREWALL_API_URL=http://127.0.0.1:8090
FIREWALLA_API_URL=http://127.0.0.1:8090

# Lab forward: 0=drop (safe default), 1=allow lab↔LAN for bench testing
LAB_FORWARD=0

# Sentinel co-hosted on this box
SENTINEL_PORT=8098

# GPU-accelerated packet analysis (fleet host .221 — CT940 has no GPU passthrough)
GPU_PERF_ENABLED=1
GPU_PERF_URL=http://192.168.167.221:8795

# Zenodo dimensional folding (18728103 + related papers) — local engine in CT940;
# optional upstream relay when host runs array-fold-relay (19557)
FOLDING_ENABLED=1
FOLD_RELAY_URL=
ARRAY_PROCESSOR_FOLD_DIM=32

# QoS: auto | cake | htb
QOS_MODE=auto
ROUTE_TABLE_GAMING=100
