# array-firewall — example site config (copy to /etc/array-firewall/array-firewall.conf)
# xbox_router: eth0 = house LAN + console gateway alias; eth1 = WAN.

ROLE=xbox_router
CUTOVER=0
LAN_GATEWAY_IP=203.0.113.1

MGMT_IF=eth0
LAN_IF=eth0
WAN_IF=eth1
UPLINK_IF=eth1
UPSTREAM_GW=198.18.0.1
MGMT_IP=192.0.2.10
LAB_CIDR=198.51.100.0/24
LAN_CIDR=203.0.113.0/24
MGMT_CIDR=192.0.2.0/24

ADMIN_LAPTOP_MAC=

API_PORT=8090
POLICIES_FILE=/var/lib/array-firewall/policies.json

XBOX_IP=203.0.113.11
XBOX_MAC=aa:bb:cc:dd:ee:ff
XBOX_NAT_OPEN=0

TINY_MAX=79
XBOX_UDP_PORTS=(88 500 3074 3075 3544 4500 53 9002)
XBOX_TCP_PORTS=(3074 80 53 443 2869)

ARRAY_FIREWALL_API_URL=http://127.0.0.1:8090
FIREWALLA_API_URL=http://127.0.0.1:8090

LAB_FORWARD=0
SENTINEL_PORT=8098

GPU_PERF_ENABLED=1
GPU_PERF_URL=http://192.0.2.50:8795

FOLDING_ENABLED=1
FOLD_RELAY_URL=
ARRAY_PROCESSOR_FOLD_DIM=32

QOS_MODE=auto
ROUTE_TABLE_GAMING=100
